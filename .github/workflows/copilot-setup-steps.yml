name: "Copilot Setup Steps"

# Runs automatically when this file changes (validates it works),
# and can be triggered manually from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # IMPORTANT: this job MUST be named `copilot-setup-steps` exactly.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Install dependencies (cached via actions/setup-node above) ────────
      - name: Install npm dependencies
        run: npm ci

      # ── Verify build compiles cleanly ─────────────────────────────────────
      - name: Type-check
        run: npx tsc --noEmit
